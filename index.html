            let b = Array(8).fill().map(() => Array(8).fill(null));
            const pieces = ['rook','knight','bishop','queen','king','bishop','knight','rook'];
            for(let i=0;i<8;i++) {

        function getPieceSymbol(p) {
            if(!p) return '';
            const sym = { king:'♔', queen:'♕', rook:'♖', bishop:'♗', knight:'♘', pawn:'♙' };
            if(p.color==='black') {
                if(p.type==='king') return '♚';
                if(p.type==='queen') return '♛';
                if(p.type==='rook') return '♜';
                if(p.type==='bishop') return '♝';
                if(p.type==='knight') return '♞';

            }
            return sym[p.type];
        }
        function isClearLine(r1,c1,r2,c2,boardState){
            if(r1===r2){
                let step = c1<c2?1:-1;
                for(let c=c1+step; c!==c2; c+=step) if(boardState[r1][c]) return false;
                return true;
            }
            if(c1===c2){
                let step = r1<r2?1:-1;
                for(let r=r1+step; r!==r2; r+=step) if(boardState[r][c1]) return false;
                return true;
            }
            let rowStep = r1<r2?1:-1, colStep = c1<c2?1:-1;
            let r=r1+rowStep, c=c1+colStep;
            while(r!==r2 && c!==c2){ if(boardState[r][c]) return false; r+=rowStep; c+=colStep; }
            return true;
        }
        function isSquareAttacked(boardState, row, col, defendingColor) {
            for(let i=0;i<8;i++) for(let j=0;j<8;j++) {
                let piece = boardState[i][j];
                if(piece && piece.color !== defendingColor) {

            }
            if(!kingPos) return false;

        }
        function hasLegalMoves(color, boardState) {

                    for(let ti=0;ti<8;ti++) for(let tj=0;tj<8;tj++) {
                        if(isValidMove(piece, i, j, ti, tj, boardState, true)) {
                            let testBoard = applyMove({ from:[i,j], to:[ti,tj] }, boardState);
                            if(!isCheck(color, testBoard)) return true;
                        }
                    }
                }
            }
            return false;
        }
        function updateGameStatus() {
            let currentColor = currentMoveNumber%2===1 ? "white" : "black";
            checkStatus = isCheck(currentColor, board);
            checkmateStatus = checkStatus && !hasLegalMoves(currentColor, board);
            if(checkmateStatus) {
                gameOver = true;
                let winner = currentColor === "white" ? "Чёрные" : "Белые";
                showBoardNotificationCentered(`МАТ! ${winner} победили`, true);
            } else if(checkStatus && !gameOver) {
                showBoardNotificationCentered(`ШАХ!`, false);
            }
        }
        function isValidMove(piece, fromRow, fromCol, toRow, toCol, boardState, checkEnPassant=true){
            const target = boardState[toRow][toCol];
            if(target && target.color===piece.color) return false;
            const dr = toRow-fromRow, dc = toCol-fromCol, absDr=Math.abs(dr), absDc=Math.abs(dc);
            let basicValid = false;
            switch(piece.type){
                case 'pawn': {
                    const dir = piece.color==='white' ? -1 : 1;
                    const startRow = piece.color==='white' ? 6 : 1;
                    if(dc===0 && !target && dr===dir) basicValid = true;
                    else if(dc===0 && !target && dr===dir*2 && fromRow===startRow && !boardState[fromRow+dir][fromCol]) basicValid = true;
                    else if(absDc===1 && dr===dir && target && target.color!==piece.color) basicValid = true;
                    else if(checkEnPassant && enPassantTarget && absDc===1 && dr===dir && toRow===enPassantTarget.row && toCol===enPassantTarget.col) basicValid = true;
                    else return false;
                    break;
                }
                case 'knight': basicValid = (absDr===2 && absDc===1) || (absDr===1 && absDc===2); break;
                case 'king': basicValid = (absDr<=1 && absDc<=1); break;
                case 'rook': basicValid = (fromRow===toRow || fromCol===toCol) && isClearLine(fromRow,fromCol,toRow,toCol,boardState); break;
                case 'bishop': basicValid = (absDr===absDc) && isClearLine(fromRow,fromCol,toRow,toCol,boardState); break;
                case 'queen': basicValid = (fromRow===toRow || fromCol===toCol || absDr===absDc) && isClearLine(fromRow,fromCol,toRow,toCol,boardState); break;
                default: return false;
            }
            if(!basicValid) return false;
            let testBoard = applyMove({ from:[fromRow,fromCol], to:[toRow,toCol] }, boardState);
            return !isCheck(piece.color, testBoard);
        }
        function applyMove(move, boardState){
            let newBoard = JSON.parse(JSON.stringify(boardState));
            let piece = newBoard[move.from[0]][move.from[1]];
            if(piece.type==='pawn' && enPassantTarget && move.to[0]===enPassantTarget.row && move.to[1]===enPassantTarget.col && Math.abs(move.to[1]-move.from[1])===1){
                let pawnRow = piece.color==='white' ? move.to[0]+1 : move.to[0]-1;
                newBoard[pawnRow][move.to[1]] = null;
            }
            newBoard[move.to[0]][move.to[1]] = piece;
            newBoard[move.from[0]][move.from[1]] = null;
            if(piece.type==='pawn' && (move.to[0]===0 || move.to[0]===7)) newBoard[move.to[0]][move.to[1]] = { type:'queen', color:piece.color };
            return newBoard;
        }
        function getSquareName(row,col){ return String.fromCharCode(97+col)+(8-row); }
        function getSAN(piece, fromRow, fromCol, toRow, toCol, boardState, isCheckAfter, isMateAfter){
            let prefix = "";
            if(piece.type==='pawn'){
                let target = boardState[toRow][toCol];
                if(target) prefix = getSquareName(fromRow,fromCol)[0];
            } else {
                const map = { king:'K', queen:'Q', rook:'R', bishop:'B', knight:'N' };
                prefix = map[piece.type];
            }
            let capture = (boardState[toRow][toCol] !== null) ? "x" : "";
            let toSquare = getSquareName(toRow,toCol);
            let san = prefix + capture + toSquare;
            if(isMateAfter) san += '#';
            else if(isCheckAfter) san += '+';
            return san;
        }

        function initArrowCanvas(){
            const canvas = document.getElementById('arrowCanvas');

        function drawAllArrows(){
            if(!ctx) return;
            ctx.clearRect(0,0,448,448);
            const cellSize=56;
            for(let a of currentArrows){
                const fromX = a.fromCol*cellSize + cellSize/2;
                const fromY = a.fromRow*cellSize + cellSize/2;
                const toX = a.toCol*cellSize + cellSize/2;
                const toY = a.toRow*cellSize + cellSize/2;
                ctx.beginPath();
                ctx.moveTo(fromX, fromY);
                ctx.lineTo(toX, toY);
                ctx.strokeStyle = '#2ecc71';
                ctx.lineWidth = 4;
                ctx.stroke();
                const angle = Math.atan2(toY-fromY, toX-fromX);
                const arrowSize=12;
                const headX=toX, headY=toY;
                const wingX = headX - arrowSize*Math.cos(angle-Math.PI/6);
                const wingY = headY - arrowSize*Math.sin(angle-Math.PI/6);
                const wingX2 = headX - arrowSize*Math.cos(angle+Math.PI/6);
                const wingY2 = headY - arrowSize*Math.sin(angle+Math.PI/6);
                ctx.beginPath();
                ctx.moveTo(headX, headY);
                ctx.lineTo(wingX, wingY);
                ctx.lineTo(wingX2, wingY2);
                ctx.fillStyle = '#2ecc71';
                ctx.fill();
            }
        }
        function addArrowToCurrent(fromRow,fromCol,toRow,toCol){
            currentArrows.push({ fromRow, fromCol, toRow, toCol });
            drawAllArrows();

                    if(e.button===2){
                        e.preventDefault();
                        start = { row: parseInt(sq.dataset.row), col: parseInt(sq.dataset.col) };
                        drawing = true;
                        document.body.style.cursor = 'crosshair';
                    }
                });
            });
            window.addEventListener('mousemove', e=>{
                if(!drawing || !start) return;
                const target = document.elementFromPoint(e.clientX, e.clientY);
                const tSq = target?.closest('.square');
                if(tSq){
                    const toRow = parseInt(tSq.dataset.row), toCol = parseInt(tSq.dataset.col);
                    drawAllArrows();
                    const fromX = start.col*56+28, fromY = start.row*56+28;
                    const toX = toCol*56+28, toY = toRow*56+28;
                    ctx.beginPath();
                    ctx.moveTo(fromX, fromY);
                    ctx.lineTo(toX, toY);
                    ctx.strokeStyle = '#2ecc71';
                    ctx.lineWidth=4;
                    ctx.stroke();
                    const angle = Math.atan2(toY-fromY, toX-fromX);
                    const arrowSize=12;
                    const headX=toX, headY=toY;
                    const wingX = headX - arrowSize*Math.cos(angle-Math.PI/6);
                    const wingY = headY - arrowSize*Math.sin(angle-Math.PI/6);
                    const wingX2 = headX - arrowSize*Math.cos(angle+Math.PI/6);
                    const wingY2 = headY - arrowSize*Math.sin(angle+Math.PI/6);
                    ctx.beginPath();
                    ctx.moveTo(headX, headY);
                    ctx.lineTo(wingX, wingY);
                    ctx.lineTo(wingX2, wingY2);
                    ctx.fill();
                }
            });
            window.addEventListener('mouseup', e=>{
                if(drawing && start && e.button===2){
                    const target = document.elementFromPoint(e.clientX, e.clientY);
                    const tSq = target?.closest('.square');
                    if(tSq){
                        const toRow = parseInt(tSq.dataset.row), toCol = parseInt(tSq.dataset.col);
                        if(!(toRow===start.row && toCol===start.col)) addArrowToCurrent(start.row, start.col, toRow, toCol);
                    }
                }
                drawing=false; start=null;
                document.body.style.cursor='';
                drawAllArrows();
            });

        function applyTemporaryMove(fromRow, fromCol, toRow, toCol){
            if(isMovePending) { alert("Сначала подтвердите или отмените текущий ход"); return false; }
            if(gameOver) { alert("Партия завершена (мат). Начните новую партию."); return false; }
            const piece = board[fromRow][fromCol];
            if(!piece) return false;
            const expectedColor = currentMoveNumber%2===1 ? "white" : "black";
            if(piece.color !== expectedColor){ alert(`Сейчас ход ${expectedColor==="white"?"белых":"чёрных"}`); return false; }
            if(!isValidMove(piece, fromRow, fromCol, toRow, toCol, board)) return false;
            const oldBoard = JSON.parse(JSON.stringify(board));
            const oldEnPassant = enPassantTarget;
            const oldMoveNumber = currentMoveNumber;
            const oldArrows = [...currentArrows];
            const newBoard = applyMove({ from: [fromRow, fromCol], to: [toRow, toCol] }, board);
            const nextColor = expectedColor === "white" ? "black" : "white";
            const isCheckAfter = isCheck(nextColor, newBoard);
            const isMateAfter = isCheckAfter && !hasLegalMoves(nextColor, newBoard);
            const san = getSAN(piece, fromRow, fromCol, toRow, toCol, board, isCheckAfter, isMateAfter);
            temporaryMove = {
                from: [fromRow, fromCol], to: [toRow, toCol],
                piece: piece, san: san,
                oldBoard, oldEnPassant, oldMoveNumber, arrows: oldArrows,
                isCheckAfter, isMateAfter
            };
            board = newBoard;
            currentArrows = [];
            clearCurrentArrows();
            isMovePending = true;
            updateGameStatus();
            renderRecorder();
            return true;
        }
        function commitTemporaryMove(){
            if(!temporaryMove){ alert("Сначала сделайте ход (перетащите фигуру)"); return; }
            const finalArrows = [...currentArrows];
            const san = temporaryMove.san;
            showCommentDialog(san, (comment)=>{
                moveHistory.push({
                    san, comment,
                    from: temporaryMove.from, to: temporaryMove.to,
                    piece: temporaryMove.piece.type, color: temporaryMove.piece.color,
                    moveNumber: temporaryMove.oldMoveNumber,
                    arrows: finalArrows,
                    isCheck: temporaryMove.isCheckAfter,
                    isMate: temporaryMove.isMateAfter
                });
                currentMoveNumber = temporaryMove.oldMoveNumber + 1;
                temporaryMove = null;
                currentArrows = [];
                clearCurrentArrows();
                isMovePending = false;
                updateGameStatus();
                renderRecorder();
                saveCurrentUserData();
            });
        }
        function undoLastMove(){
            if(temporaryMove){
                board = temporaryMove.oldBoard;
                enPassantTarget = temporaryMove.oldEnPassant;
                currentMoveNumber = temporaryMove.oldMoveNumber;
                currentArrows = temporaryMove.arrows;
                temporaryMove = null;
                isMovePending = false;
                gameOver = false;
                checkStatus = false;
                checkmateStatus = false;
                drawAllArrows();
                renderRecorder();
                return;
            }
            if(moveHistory.length === 0) return;
            moveHistory.pop();
            let newBoard = getInitialBoard();
            let savedEp = enPassantTarget;
            enPassantTarget = null;
            for(let m of moveHistory) newBoard = applyMove({ from: m.from, to: m.to }, newBoard);
            enPassantTarget = savedEp;
            board = newBoard;
            currentMoveNumber = moveHistory.length + 1;
            temporaryMove = null;
            isMovePending = false;
            currentArrows = [];
            gameOver = false;
            updateGameStatus();
            renderRecorder();
            saveCurrentUserData();
        }

            if (!currentUserId || targetUid === currentUserId) return;
            await database.ref(`users/${currentUserId}/friendRequests/sent/${targetUid}`).set(true);
            await database.ref(`users/${targetUid}/friendRequests/received/${currentUserId}`).set(true);
            alert("Заявка отправлена");
            renderFriends();
        }

        async function acceptFriendRequest(fromUid) {
            await database.ref(`users/${currentUserId}/friends/${fromUid}`).set(true);
            await database.ref(`users/${fromUid}/friends/${currentUserId}`).set(true);
            await database.ref(`users/${currentUserId}/friendRequests/received/${fromUid}`).remove();
            await database.ref(`users/${fromUid}/friendRequests/sent/${currentUserId}`).remove();
            alert("Теперь вы друзья");
            renderFriends();
        }

        async function declineFriendRequest(fromUid) {
            await database.ref(`users/${currentUserId}/friendRequests/received/${fromUid}`).remove();
            await database.ref(`users/${fromUid}/friendRequests/sent/${currentUserId}`).remove();
            renderFriends();
        }

        async function removeFriend(friendUid) {
            if (confirm("Удалить из друзей?")) {
                await database.ref(`users/${currentUserId}/friends/${friendUid}`).remove();
                await database.ref(`users/${friendUid}/friends/${currentUserId}`).remove();
                renderFriends();
            }
        }

        async function searchUserByName(username) {
            if (!username.trim()) return null;
            const snapshot = await database.ref('users').once('value');
            const users = snapshot.val() || {};
            for (let uid in users) {
                const profile = users[uid].profile || {};
                const name = profile.name || users[uid].name || "";
                if (name.toLowerCase() === username.trim().toLowerCase() && uid !== currentUserId) {
                    return { uid, name, avatar: profile.avatar || users[uid].avatar || "♙" };
                }
            }
            return null;
        }

        function subscribeToFriendStatus(uid, elementId) {
            const statusRef = database.ref(`users/${uid}/status`);
            const callback = (snap) => {
                const status = snap.val();
                const statusSpan = document.getElementById(`status-${uid}`);
                if (statusSpan) {
                    statusSpan.className = status === 'online' ? 'online-status' : 'online-status offline';
                }
            };
            statusRef.on('value', callback);
            friendsStatusRefs.push({ ref: statusRef, callback });
        }

        function unsubscribeAllStatuses() {
            friendsStatusRefs.forEach(item => {
                item.ref.off('value', item.callback);
            });
            friendsStatusRefs = [];
        }

        async function renderFriends() {
            const container = document.getElementById("friendsContainer");
            if (!container) return;
            unsubscribeAllStatuses();
            await loadFriendsData();
            let html = `
                <div class="friends-search">
                    <input type="text" id="searchFriendInput" placeholder="Введите имя пользователя">
                    <button id="searchFriendBtn">🔍 Найти</button>
                </div>
                <div id="searchResult"></div>
                <div class="friends-tabs">
                    <button class="friends-tab active" data-tab="requests">📩 Заявки (${incomingRequests.length})</button>
                    <button class="friends-tab" data-tab="myfriends">👥 Мои друзья (${currentFriendsList.length})</button>
                </div>
                <div id="friendsTabContent" class="friends-list"></div>
            `;
            container.innerHTML = html;
            await renderTabContent("requests");
            document.querySelectorAll(".friends-tab").forEach(tab => {
                tab.addEventListener("click", async () => {
                    document.querySelectorAll(".friends-tab").forEach(t => t.classList.remove("active"));
                    tab.classList.add("active");
                    await renderTabContent(tab.dataset.tab);
                });
            });
            document.getElementById("searchFriendBtn")?.addEventListener("click", async () => {
                const name = document.getElementById("searchFriendInput").value.trim();
                const resultDiv = document.getElementById("searchResult");
                if (!name) { resultDiv.innerHTML = '<div class="message">Введите имя</div>'; return; }
                const user = await searchUserByName(name);
                if (!user) {
                    resultDiv.innerHTML = '<div class="message">❌ Пользователь не найден</div>';
                    return;
                }
                let status = "none";
                if (currentFriendsList.includes(user.uid)) status = "friend";
                else if (incomingRequests.includes(user.uid)) status = "incoming";
                else {
                    const sentSnap = await database.ref(`users/${currentUserId}/friendRequests/sent/${user.uid}`).once('value');
                    if (sentSnap.val()) status = "sent";
                }
                let buttonHtml = "";
                if (status === "none") buttonHtml = `<button class="add-friend-btn" data-uid="${user.uid}">➕ Добавить в друзья</button>`;
                else if (status === "sent") buttonHtml = `<button disabled>⏳ Заявка отправлена</button>`;
                else if (status === "incoming") buttonHtml = `<button class="accept-friend-btn" data-uid="${user.uid}">✅ Принять</button> <button class="decline-friend-btn" data-uid="${user.uid}">❌ Отклонить</button>`;
                else if (status === "friend") buttonHtml = `<button class="remove-friend-btn" data-uid="${user.uid}">🗑️ Удалить из друзей</button>`;
                resultDiv.innerHTML = `
                    <div class="friend-result-card">
                        <div style="display:flex; align-items:center;">
                            <div class="friend-avatar">${user.avatar}</div>
                            <div class="friend-info"><div class="friend-name">${escapeHtml(user.name)}</div></div>
                        </div>
                        <div class="friend-actions">${buttonHtml}</div>
                    </div>
                `;
                attachResultButtons();
            });
        }

        async function renderTabContent(tab) {
            const contentDiv = document.getElementById("friendsTabContent");
            if (!contentDiv) return;
            if (tab === "requests") {
                const requestsWithData = await Promise.all(incomingRequests.map(async (uid) => {
                    const userSnap = await database.ref(`users/${uid}/profile`).once('value');
                    const profile = userSnap.val() || {};
                    return { uid, name: profile.name || "Игрок", avatar: profile.avatar || "♙", status: "incoming" };
                }));
                contentDiv.innerHTML = renderUsersList(requestsWithData);
            } else if (tab === "myfriends") {
                const friendsWithData = await Promise.all(currentFriendsList.map(async (uid) => {
                    const userSnap = await database.ref(`users/${uid}/profile`).once('value');
                    const profile = userSnap.val() || {};
                    const statusSnap = await database.ref(`users/${uid}/status`).once('value');
                    const status = statusSnap.val() === 'online' ? 'online' : 'offline';
                    return { uid, name: profile.name || "Игрок", avatar: profile.avatar || "♙", status: "friend", online: status };
                }));
                contentDiv.innerHTML = renderUsersList(friendsWithData, true);
                for (let friend of friendsWithData) {
                    subscribeToFriendStatus(friend.uid, `status-${friend.uid}`);
                }
            }
            attachFriendsListButtons();
        }

        function renderUsersList(users, showOnline = false) {
            if (!users.length) return '<div class="message">Нет пользователей</div>';
            let html = '';
            for (let user of users) {
                let statusHtml = '';
                if (showOnline) {
                    statusHtml = `<span class="online-status ${user.online === 'online' ? '' : 'offline'}" id="status-${user.uid}"></span>`;
                }
                html += `<div class="friend-result-card">
                            <div style="display:flex; align-items:center;">
                                <div class="friend-avatar">${user.avatar}</div>
                                <div class="friend-info">
                                    <div class="friend-name">${escapeHtml(user.name)} ${statusHtml}</div>
                                </div>
                            </div>
                            <div class="friend-actions">`;
                if (user.status === "incoming") {
                    html += `<button class="accept-friend-btn" data-uid="${user.uid}">✅ Принять</button>
                             <button class="decline-friend-btn" data-uid="${user.uid}">❌ Отклонить</button>`;
                } else if (user.status === "friend") {
                    html += `<button class="remove-friend-btn" data-uid="${user.uid}">🗑️ Удалить</button>`;
                }
                html += `</div></div>`;
            }
            return html;
        }

        function attachResultButtons() {
            document.querySelectorAll(".add-friend-btn").forEach(btn => {
                btn.addEventListener("click", async () => await sendFriendRequest(btn.dataset.uid));
            });
            document.querySelectorAll(".accept-friend-btn").forEach(btn => {
                btn.addEventListener("click", async () => await acceptFriendRequest(btn.dataset.uid));
            });
            document.querySelectorAll(".decline-friend-btn").forEach(btn => {
                btn.addEventListener("click", async () => await declineFriendRequest(btn.dataset.uid));
            });
            document.querySelectorAll(".remove-friend-btn").forEach(btn => {
                btn.addEventListener("click", async () => await removeFriend(btn.dataset.uid));
            });
        }

        function attachFriendsListButtons() {
            document.querySelectorAll(".accept-friend-btn").forEach(btn => {
                btn.addEventListener("click", async () => await acceptFriendRequest(btn.dataset.uid));
            });
            document.querySelectorAll(".decline-friend-btn").forEach(btn => {
                btn.addEventListener("click", async () => await declineFriendRequest(btn.dataset.uid));
            });
            document.querySelectorAll(".remove-friend-btn").forEach(btn => {
                btn.addEventListener("click", async () => await removeFriend(btn.dataset.uid));
            });
        }

        // ==================== РАЗДЕЛ СООБЩЕНИЙ (БЕЗ ДУБЛИРОВАНИЯ) ====================
        let currentChatFriend = null;
        let currentChatListenerRef = null;
        let currentChatListenerCallback = null;

        function getChatId(uid1, uid2) {
            return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
        }

        async function sendMessage(text) {
            if (!currentChatFriend || !text.trim()) return;
            const chatId = getChatId(currentUserId, currentChatFriend);
            const message = {
                from: currentUserId,
                text: text.trim(),
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };
            await database.ref(`messages/${chatId}`).push(message);
            const inputField = document.getElementById("messageInput");
            if (inputField) inputField.value = "";
        }

        function displayMessage(msg, container) {
            const isMine = msg.from === currentUserId;
            const div = document.createElement('div');
            div.className = `chat-message ${isMine ? 'mine' : ''}`;
            div.innerHTML = `<div class="chat-message-text">${escapeHtml(msg.text)}</div>
                             <div class="chat-message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function loadChatHistory(chatId, container, onNewMessage) {
            const snapshot = await database.ref(`messages/${chatId}`).orderByChild('timestamp').once('value');
            const messages = snapshot.val();
            if (messages) {
                const sorted = Object.values(messages).sort((a,b) => a.timestamp - b.timestamp);
                for (let msg of sorted) {
                    displayMessage(msg, container);
                }
            }
            // подписываемся на новые сообщения
            const callback = database.ref(`messages/${chatId}`).orderByChild('timestamp').startAfter(Date.now()).on('child_added', (snap) => {
                const newMsg = snap.val();
                if (newMsg && newMsg.from !== currentUserId) {
                    displayMessage(newMsg, container);
                }
            });
            return callback;
        }

        async function openChat(friendUid) {
            // отписываемся от предыдущего чата
            if (currentChatListenerRef && currentChatListenerCallback) {
                currentChatListenerRef.off('child_added', currentChatListenerCallback);
            }
            currentChatFriend = friendUid;
            const messagesContainer = document.getElementById("chatMessagesList");
            if (!messagesContainer) return;
            messagesContainer.innerHTML = "";
            // получаем данные друга
            const friendSnap = await database.ref(`users/${friendUid}/profile`).once('value');
            const friendProfile = friendSnap.val() || {};
            const friendName = friendProfile.name || "Друг";
            const chatHeader = document.getElementById("chatHeaderName");
            if (chatHeader) chatHeader.innerText = friendName;
            const chatId = getChatId(currentUserId, friendUid);
            currentChatListenerRef = database.ref(`messages/${chatId}`);
            const callback = await loadChatHistory(chatId, messagesContainer, null);
            // сохраняем callback для отписки
            currentChatListenerCallback = callback;
            // также подписываемся на новые сообщения через отдельный listener
            const newMsgRef = database.ref(`messages/${chatId}`).orderByChild('timestamp');
            const newMsgCallback = newMsgRef.on('child_added', (snap) => {
                const newMsg = snap.val();
                if (newMsg && newMsg.from !== currentUserId && messagesContainer) {
                    displayMessage(newMsg, messagesContainer);
                }
            });
            // сохраняем для отписки
            currentChatListenerCallback = newMsgCallback;
        }

        async function renderMessages() {
            const container = document.getElementById("messagesContainer");
            if (!container) return;
            // отписываемся от предыдущего чата, если он был открыт
            if (currentChatListenerRef && currentChatListenerCallback) {
                currentChatListenerRef.off('child_added', currentChatListenerCallback);
            }
            await loadFriendsData();
            const friendsWithData = await Promise.all(currentFriendsList.map(async (uid) => {
                const userSnap = await database.ref(`users/${uid}/profile`).once('value');
                const profile = userSnap.val() || {};
                const statusSnap = await database.ref(`users/${uid}/status`).once('value');
                const status = statusSnap.val() === 'online' ? 'online' : 'offline';
                return { uid, name: profile.name || "Игрок", avatar: profile.avatar || "♙", status };
            }));
            let html = `<div class="chat-layout">
                <div class="chat-contacts">
                    <div style="padding: 12px; font-weight: bold; border-bottom: 1px solid #e9e5db;">Контакты</div>`;
            for (let friend of friendsWithData) {
                html += `<div class="chat-contact-item" data-uid="${friend.uid}">
                            <div class="chat-contact-avatar" style="font-size: 1.5rem; margin-right: 12px;">${friend.avatar}</div>
                            <div class="chat-contact-name">${escapeHtml(friend.name)}</div>
                            <div class="chat-contact-status"><span class="online-status ${friend.status === 'online' ? '' : 'offline'}"></span></div>
                        </div>`;
            }
            if (friendsWithData.length === 0) html += `<div class="message">Нет друзей. Добавьте кого-нибудь, чтобы начать общение.</div>`;
            html += `</div>
                <div class="chat-messages">
                    <div class="chat-header" id="chatHeaderName">Выберите друга</div>
                    <div class="chat-messages-list" id="chatMessagesList"></div>
                    <div class="chat-input">
                        <input type="text" id="messageInput" placeholder="Введите сообщение...">
                        <button id="sendMessageBtn">📤 Отправить</button>
                    </div>
                </div>
            </div>`;
            container.innerHTML = html;
            // Обработчики выбора контакта
            document.querySelectorAll(".chat-contact-item").forEach(el => {
                el.addEventListener("click", () => {
                    const uid = el.dataset.uid;
                    openChat(uid);
                });
            });
            document.getElementById("sendMessageBtn")?.addEventListener("click", () => {
                const input = document.getElementById("messageInput");
                if (input && currentChatFriend) sendMessage(input.value);
            });
            document.getElementById("messageInput")?.addEventListener("keypress", (e) => {
                if (e.key === 'Enter' && currentChatFriend) sendMessage(e.target.value);
            });
        }

        // ==================== ЗАГРУЗКА ДАННЫХ ПОЛЬЗОВАТЕЛЯ ====================
        async function loadUserDataFromRTDB() {
            if (!currentUser) return;
            const userRef = database.ref(`users/${currentUserId}`);
            const snapshot = await userRef.once('value');
            const data = snapshot.val() || {};
            savedGames = data.games || [];
            discussionsPosts = data.discussions || [];
            currentUserSettings.name = data.profile?.name || data.name || currentUser.email.split('@')[0];
            currentUserSettings.avatar = data.profile?.avatar || data.avatar || "♙";
            document.getElementById("headerName").innerText = currentUserSettings.name;
            document.getElementById("headerAvatar").innerHTML = currentUserSettings.avatar;
        }

        async function saveCurrentUserData() {
            if (!currentUser) return;
            const userRef = database.ref(`users/${currentUserId}`);
            await userRef.update({
                profile: { name: currentUserSettings.name, avatar: currentUserSettings.avatar },
                games: savedGames,
                discussions: discussionsPosts
            });
        }

        // ==================== ПРОФИЛЬ И ВЫХОД ====================
        function openProfile(){
            const modal = document.getElementById("profileModal");
            if(!modal) return;
            document.getElementById("profileNameInput").value = currentUserSettings.name;
            document.getElementById("modalAvatar").innerHTML = currentUserSettings.avatar;
            let grid = document.getElementById("avatarGrid");
            grid.innerHTML = "";
            const avatars = ["♙", "♘", "♗", "♖", "♕", "♔", "♟️", "♞", "♝", "♜", "♛", "♚"];
            avatars.forEach(av => {
                let div = document.createElement("div");
                div.className = "avatar-option";
                if(av === currentUserSettings.avatar) div.classList.add("selected");
                div.innerHTML = av;
                div.onclick = () => {
                    document.querySelectorAll("#avatarGrid .avatar-option").forEach(a => a.classList.remove("selected"));
                    div.classList.add("selected");
                    document.getElementById("modalAvatar").innerHTML = av;
                };
                grid.appendChild(div);
            });
            modal.style.display = "flex";
        }
        function closeProfile(){ document.getElementById("profileModal").style.display = "none"; }
        function saveProfile(){
            let newName = document.getElementById("profileNameInput").value.trim();
            if(newName) currentUserSettings.name = newName;
            currentUserSettings.avatar = document.getElementById("modalAvatar").innerHTML;
            document.getElementById("headerName").innerText = currentUserSettings.name;
            document.getElementById("headerAvatar").innerHTML = currentUserSettings.avatar;
            saveCurrentUserData();
            closeProfile();
            renderCurrentSection();
        }
        function logout(){
            if(confirm("Вы уверены, что хотите выйти?")){
                updateStatus('offline');
                auth.signOut().then(() => {
                    currentUser = null;
                    currentUserId = null;
                    document.getElementById("mainApp").style.display = "none";
                    document.getElementById("authModal").style.display = "flex";
                });
            }
        }

        // ==================== НАВИГАЦИЯ ====================
        let currentSection = "recorder";
        function renderCurrentSection(){
            const title = document.getElementById("sectionTitle");
            const panel = document.getElementById("contentPanel");
            if(currentSection === "recorder"){
                title.innerText = "Запись партии";
                panel.innerHTML = `<div id="recorderContainer" style="height:100%;"></div>`;
                resetGameState();
                renderRecorder();
            } else if(currentSection === "games"){
                title.innerText = "Мои партии";
                panel.innerHTML = `<div id="gamesContainer"></div>`;
                renderGamesList();
            } else if(currentSection === "discussions"){
                title.innerText = "Обсуждения";
                panel.innerHTML = `<div id="discussionsContainer"></div>`;
                renderDiscussions();
            } else if(currentSection === "friends"){
                title.innerText = "Друзья";
                panel.innerHTML = `<div id="friendsContainer"></div>`;
                renderFriends();
            } else if(currentSection === "messages"){
                title.innerText = "Сообщения";
                panel.innerHTML = `<div id="messagesContainer"></div>`;
                renderMessages();
            }
        }
        function setActiveSection(section){
            currentSection = section;
            document.querySelectorAll(".nav-btn").forEach(btn => {
                if(btn.dataset.section === section) btn.classList.add("active");
                else btn.classList.remove("active");
            });
            renderCurrentSection();
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ПОСЛЕ ВХОДА ====================
        async function initAppAfterLogin() {
            await loadUserDataFromRTDB();
            resetGameState();
            setupStatusTracking();
            document.querySelectorAll(".nav-btn").forEach(btn => btn.addEventListener("click", () => setActiveSection(btn.dataset.section)));
            document.getElementById("profileBtn").addEventListener("click", openProfile);
            document.getElementById("saveProfileBtn").addEventListener("click", saveProfile);
            document.getElementById("closeProfileModalBtn").addEventListener("click", closeProfile);
            document.getElementById("logoutBtn").addEventListener("click", logout);
            setActiveSection("recorder");
        }

        // ==================== АУТЕНТИФИКАЦИЯ ====================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                currentUserId = user.uid;
                document.getElementById("authModal").style.display = "none";
                document.getElementById("mainApp").style.display = "block";
                await initAppAfterLogin();
            } else {
                document.getElementById("mainApp").style.display = "none";
                document.getElementById("authModal").style.display = "flex";
            }
        });

        // ==================== ОБРАБОТЧИКИ ВХОДА/РЕГИСТРАЦИИ ====================
        const loginTab = document.querySelector("[data-tab='login']");
        const registerTab = document.querySelector("[data-tab='register']");
        const loginFormDiv = document.getElementById("loginForm");
        const registerFormDiv = document.getElementById("registerForm");
        loginTab.addEventListener("click", () => {
            loginTab.classList.add("active");
            registerTab.classList.remove("active");
            loginFormDiv.style.display = "block";
            registerFormDiv.style.display = "none";
        });
        registerTab.addEventListener("click", () => {
            registerTab.classList.add("active");
            loginTab.classList.remove("active");
            loginFormDiv.style.display = "none";
            registerFormDiv.style.display = "block";
        });
        document.getElementById("loginBtn").addEventListener("click", async () => {
            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value.trim();
            const errorDiv = document.getElementById("loginError");
            errorDiv.textContent = "";
            if (!email || !password) { errorDiv.textContent = "Заполните все поля"; return; }
            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch (err) {
                errorDiv.textContent = err.message;
            }
        });
        document.getElementById("registerBtn").addEventListener("click", async () => {
            const email = document.getElementById("regEmail").value.trim();
            const name = document.getElementById("regName").value.trim();
            const password = document.getElementById("regPassword").value.trim();
            const errorDiv = document.getElementById("registerError");
            errorDiv.textContent = "";
            if (!email || !name || !password) { errorDiv.textContent = "Заполните все поля"; return; }
            if (!email.includes("@")) { errorDiv.textContent = "Введите корректный email"; return; }
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                const userRef = database.ref(`users/${cred.user.uid}`);
                await userRef.set({
                    profile: { name: name, avatar: "♙" },
                    games: [],
                    discussions: [],
                    friends: {},
                    friendRequests: { sent: {}, received: {} }
                });
            } catch (err) {
                errorDiv.textContent = err.message;
            }
        });

        function genId(){ return Date.now()+'-'+Math.random().toString(36).substring(2,8); }
        function escapeHtml(str){ if(!str) return ""; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        // Просмотр партий (заглушка)
        window.currentReplayGame = null;
        window.currentReplayIndex = 0;
        function openGameReplay(game){
            window.currentReplayGame = game;
            window.currentReplayIndex = game.moves.length;
            document.getElementById("modalTitle").innerHTML = `${escapeHtml(game.title)} <span style="font-size:0.7rem;">(автор: ${escapeHtml(game.author)})</span>`;
            document.getElementById("gameModal").style.display = "flex";
        }
        const gameModalDiv = document.createElement('div');
        gameModalDiv.id = "gameModal";
        gameModalDiv.className = "modal";
        gameModalDiv.innerHTML = `<div class="modal-card"><div class="modal-header"><span class="modal-title" id="modalTitle">Партия</span><button id="closeModalBtn" style="background:#8b9a8a;">Закрыть</button></div><div class="replay-layout"><div class="replay-board" id="replayBoardContainer"></div><div class="replay-history" id="replayHistoryContainer"></div></div><div class="replay-nav"><button id="prevMoveBtn">◀ Предыдущий</button><button id="nextMoveBtn">Следующий ▶</button></div></div>`;
        document.body.appendChild(gameModalDiv);
        document.getElementById("closeModalBtn")?.addEventListener("click",()=>document.getElementById("gameModal").style.display="none");
        document.getElementById("prevMoveBtn")?.addEventListener("click",()=>{ if(window.currentReplayGame && window.currentReplayIndex>0){ window.currentReplayIndex--; } });
        document.getElementById("nextMoveBtn")?.addEventListener("click",()=>{ if(window.currentReplayGame && window.currentReplayIndex<window.currentReplayGame.moves.length){ window.currentReplayIndex++; } });
    </script>
</body>
